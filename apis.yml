aid: amazon-lookout-for-metrics
name: Amazon Lookout for Metrics
description: >-
  Amazon Lookout for Metrics uses machine learning to detect anomalies in
  your metrics data and help you determine their root causes. It allows you
  to monitor business and operational metrics such as revenue performance,
  customer engagement, and user activity.
