security:
- hmac: []
tags:
- name: GetDataQualityMetrics
paths:
  /GetDataQualityMetrics:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: GetDataQualityMetrics
      description: Returns details about the requested data quality metrics.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDataQualityMetricsResponse'
        '480':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
        '481':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '482':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '483':
          description: TooManyRequestsException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsException'
        '484':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - AnomalyDetectorArn
              properties:
                AnomalyDetectorArn:
                  description: The Amazon Resource Name (ARN) of the anomaly detector that you want to investigate.
                  type: string
                  pattern: arn:([a-z\d-]+):.*:.*:.*:.+
                  maxLength: 256
                MetricSetArn:
                  description: The Amazon Resource Name (ARN) of a specific data quality metric set.
                  type: string
                  pattern: arn:([a-z\d-]+):.*:.*:.*:.+
                  maxLength: 256
      summary: Amazon Lookout for Metrics Get Data Quality Metrics
      tags:
      - GetDataQualityMetrics
components:
  schemas:
    AnomalyDetectorDataQualityMetricList:
      type: array
      items:
        $ref: '#/components/schemas/AnomalyDetectorDataQualityMetric'
    DataQualityMetricType:
      type: string
      enum:
      - COLUMN_COMPLETENESS
      - DIMENSION_UNIQUENESS
      - TIME_SERIES_COUNT
      - ROWS_PROCESSED
      - ROWS_PARTIAL_COMPLIANCE
      - INVALID_ROWS_COMPLIANCE
      - BACKTEST_TRAINING_DATA_START_TIME_STAMP
      - BACKTEST_TRAINING_DATA_END_TIME_STAMP
      - BACKTEST_INFERENCE_DATA_START_TIME_STAMP
      - BACKTEST_INFERENCE_DATA_END_TIME_STAMP
    ValidationException: {}
    ResourceNotFoundException: {}
    AnomalyDetectorDataQualityMetric:
      type: object
      properties:
        StartTimestamp:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The start time for the data quality metrics collection.
        MetricSetDataQualityMetricList:
          allOf:
          - $ref: '#/components/schemas/MetricSetDataQualityMetricList'
          - description: An array of <code>DataQualityMetricList</code> objects. Each object in the array contains information about a data quality metric.
      description: Aggregated details about the data quality metrics collected for the <code>AnomalyDetectorArn</code> provided in the <a>GetDataQualityMetrics</a> object.
    DataQualityMetric:
      type: object
      properties:
        MetricType:
          allOf:
          - $ref: '#/components/schemas/DataQualityMetricType'
          - description: The name of the data quality metric.
        MetricDescription:
          allOf:
          - $ref: '#/components/schemas/DataQualityMetricDescription'
          - description: A description of the data quality metric.
        RelatedColumnName:
          allOf:
          - $ref: '#/components/schemas/RelatedColumnName'
          - description: The column that is being monitored.
        MetricValue:
          allOf:
          - $ref: '#/components/schemas/Double'
          - description: The value of the data quality metric.
      description: An array that describes a data quality metric. Each <code>DataQualityMetric</code> object contains the data quality metric name, its value, a description of the metric, and the affected column.
    RelatedColumnName:
      type: string
      pattern: .*\S.*
      minLength: 1
      maxLength: 256
    Arn:
      type: string
      pattern: arn:([a-z\d-]+):.*:.*:.*:.+
      maxLength: 256
    Timestamp:
      type: string
      format: date-time
    DataQualityMetricDescription:
      type: string
      pattern: .*\S.*
      minLength: 1
      maxLength: 256
    Double:
      type: number
      format: double
    AccessDeniedException: {}
    MetricSetDataQualityMetricList:
      type: array
      items:
        $ref: '#/components/schemas/MetricSetDataQualityMetric'
    TooManyRequestsException: {}
    MetricSetDataQualityMetric:
      type: object
      properties:
        MetricSetArn:
          allOf:
          - $ref: '#/components/schemas/Arn'
          - description: The Amazon Resource Name (ARN) of the data quality metric array.
        DataQualityMetricList:
          allOf:
          - $ref: '#/components/schemas/DataQualityMetricList'
          - description: The array of data quality metrics contained in the data quality metric set.
      description: An array of <code>DataQualityMetric</code> objects that describes one or more data quality metrics.
    InternalServerException: {}
    DataQualityMetricList:
      type: array
      items:
        $ref: '#/components/schemas/DataQualityMetric'
    GetDataQualityMetricsResponse:
      type: object
      properties:
        AnomalyDetectorDataQualityMetricList:
          allOf:
          - $ref: '#/components/schemas/AnomalyDetectorDataQualityMetricList'
          - description: A list of the data quality metrics for the <code>AnomalyDetectorArn</code> that you requested.
  parameters:
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Content-Sha256:
