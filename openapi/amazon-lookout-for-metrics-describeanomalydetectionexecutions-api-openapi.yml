security:
- hmac: []
tags:
- name: DescribeAnomalyDetectionExecutions
paths:
  /DescribeAnomalyDetectionExecutions:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: DescribeAnomalyDetectionExecutions
      description: Returns information about the status of the specified anomaly detection jobs.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeAnomalyDetectionExecutionsResponse'
        '480':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
        '481':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '482':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '483':
          description: TooManyRequestsException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsException'
        '484':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
      parameters:
      - name: MaxResults
        in: query
        schema:
          type: string
        description: Pagination limit
        required: false
      - name: NextToken
        in: query
        schema:
          type: string
        description: Pagination token
        required: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - AnomalyDetectorArn
              properties:
                AnomalyDetectorArn:
                  description: The Amazon Resource Name (ARN) of the anomaly detector.
                  type: string
                  pattern: arn:([a-z\d-]+):.*:.*:.*:.+
                  maxLength: 256
                Timestamp:
                  description: The timestamp of the anomaly detection job.
                  type: string
                  pattern: ^([12]\d{3})-(1[0-2]|0[1-9])-(0[1-9]|[12]\d|3[01])T([01]\d|2[0-3]):([0-5]\d):([0-5]\d)(Z|(\+|\-)(0\d|1[0-2]):([0-5]\d)(\[[[:alnum:]\/\_]+\])?)$
                  maxLength: 60
                MaxResults:
                  description: The number of items to return in the response.
                  type: integer
                  minimum: 1
                  maximum: 100
                NextToken:
                  description: Specify the pagination token that's returned by a previous request to retrieve the next page of results.
                  type: string
                  pattern: .*\S.*
                  minLength: 1
                  maxLength: 3000
      summary: Amazon Lookout for Metrics Describe Anomaly Detection Executions
      tags:
      - DescribeAnomalyDetectionExecutions
components:
  parameters:
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
  schemas:
    ResourceNotFoundException: {}
    ValidationException: {}
    AnomalyDetectionTaskStatus:
      type: string
      enum:
      - PENDING
      - IN_PROGRESS
      - COMPLETED
      - FAILED
      - FAILED_TO_SCHEDULE
    DescribeAnomalyDetectionExecutionsResponse:
      type: object
      properties:
        ExecutionList:
          allOf:
          - $ref: '#/components/schemas/ExecutionList'
          - description: A list of detection jobs.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/NextToken'
          - description: The pagination token that's included if more results are available.
    ExecutionList:
      type: array
      items:
        $ref: '#/components/schemas/ExecutionStatus'
    ExecutionStatus:
      type: object
      properties:
        Timestamp:
          allOf:
          - $ref: '#/components/schemas/TimestampString'
          - description: The run's timestamp.
        Status:
          allOf:
          - $ref: '#/components/schemas/AnomalyDetectionTaskStatus'
          - description: The run's status.
        FailureReason:
          allOf:
          - $ref: '#/components/schemas/AnomalyDetectionTaskStatusMessage'
          - description: The reason that the run failed, if applicable.
      description: The status of an anomaly detector run.
    AnomalyDetectionTaskStatusMessage:
      type: string
      pattern: .*\S.*
      minLength: 1
      maxLength: 256
    NextToken:
      type: string
      pattern: .*\S.*
      minLength: 1
      maxLength: 3000
    AccessDeniedException: {}
    TimestampString:
      type: string
      pattern: ^([12]\d{3})-(1[0-2]|0[1-9])-(0[1-9]|[12]\d|3[01])T([01]\d|2[0-3]):([0-5]\d):([0-5]\d)(Z|(\+|\-)(0\d|1[0-2]):([0-5]\d)(\[[[:alnum:]\/\_]+\])?)$
      maxLength: 60
    TooManyRequestsException: {}
    InternalServerException: {}
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
