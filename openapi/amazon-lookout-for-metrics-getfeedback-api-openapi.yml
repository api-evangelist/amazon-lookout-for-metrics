security:
- hmac: []
tags:
- name: GetFeedback
paths:
  /GetFeedback:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: GetFeedback
      description: Get feedback for an anomaly group.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetFeedbackResponse'
        '480':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
        '481':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '482':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '483':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
        '484':
          description: TooManyRequestsException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsException'
      parameters:
      - name: MaxResults
        in: query
        schema:
          type: string
        description: Pagination limit
        required: false
      - name: NextToken
        in: query
        schema:
          type: string
        description: Pagination token
        required: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - AnomalyDetectorArn
              - AnomalyGroupTimeSeriesFeedback
              properties:
                AnomalyDetectorArn:
                  description: The Amazon Resource Name (ARN) of the anomaly detector.
                  type: string
                  pattern: arn:([a-z\d-]+):.*:.*:.*:.+
                  maxLength: 256
                AnomalyGroupTimeSeriesFeedback:
                  description: An anomalous metric in an anomaly group.
                  type: object
                  properties:
                    AnomalyGroupId:
                      allOf:
                      - $ref: '#/components/schemas/UUID'
                      - description: The ID of the anomaly group.
                    TimeSeriesId:
                      allOf:
                      - $ref: '#/components/schemas/TimeSeriesId'
                      - description: The ID of the metric.
                MaxResults:
                  description: The maximum number of results to return.
                  type: integer
                  minimum: 1
                  maximum: 100
                NextToken:
                  description: Specify the pagination token that's returned by a previous request to retrieve the next page of results.
                  type: string
                  pattern: .*\S.*
                  minLength: 1
                  maxLength: 3000
      summary: Amazon Lookout for Metrics Get Feedback
      tags:
      - GetFeedback
components:
  parameters:
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
  schemas:
    ValidationException: {}
    UUID:
      type: string
      pattern: '[a-z0-9]{8}-[a-z0-9]{4}-[a-z0-9]{4}-[a-z0-9]{4}-[a-z0-9]{12}'
      maxLength: 63
    ResourceNotFoundException: {}
    GetFeedbackResponse:
      type: object
      properties:
        AnomalyGroupTimeSeriesFeedback:
          allOf:
          - $ref: '#/components/schemas/TimeSeriesFeedbackList'
          - description: Feedback for an anomalous metric.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/NextToken'
          - description: The pagination token that's included if more results are available.
    TimeSeriesId:
      type: string
      pattern: .*\S.*
      maxLength: 520
    Boolean:
      type: boolean
    NextToken:
      type: string
      pattern: .*\S.*
      minLength: 1
      maxLength: 3000
    TimeSeriesFeedbackList:
      type: array
      items:
        $ref: '#/components/schemas/TimeSeriesFeedback'
    TimeSeriesFeedback:
      type: object
      properties:
        TimeSeriesId:
          allOf:
          - $ref: '#/components/schemas/TimeSeriesId'
          - description: The ID of the metric.
        IsAnomaly:
          allOf:
          - $ref: '#/components/schemas/Boolean'
          - description: Feedback on whether the metric is a legitimate anomaly.
      description: Details about feedback submitted for an anomalous metric.
    AccessDeniedException: {}
    TooManyRequestsException: {}
    InternalServerException: {}
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
externalDocs:
  description: Amazon Web Services documentation
