tags:
- name: CreateAnomalyDetector
paths:
  /CreateAnomalyDetector:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: CreateAnomalyDetector
      description: Creates an anomaly detector.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAnomalyDetectorResponse'
        '480':
          description: ConflictException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictException'
        '481':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '482':
          description: ServiceQuotaExceededException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceQuotaExceededException'
        '483':
          description: ConflictException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictException'
        '484':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '485':
          description: TooManyRequestsException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsException'
        '486':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - AnomalyDetectorName
              - AnomalyDetectorConfig
              properties:
                AnomalyDetectorName:
                  description: The name of the detector.
                  type: string
                  pattern: ^[a-zA-Z0-9][a-zA-Z0-9\-_]*
                  minLength: 1
                  maxLength: 63
                AnomalyDetectorDescription:
                  description: A description of the detector.
                  type: string
                  pattern: .*\S.*
                  minLength: 1
                  maxLength: 256
                AnomalyDetectorConfig:
                  description: Contains information about a detector's configuration.
                  type: object
                  properties:
                    AnomalyDetectorFrequency:
                      allOf:
                      - $ref: '#/components/schemas/Frequency'
                      - description: The frequency at which the detector analyzes its source data.
                KmsKeyArn:
                  description: The ARN of the KMS key to use to encrypt your data.
                  type: string
                  pattern: arn:aws.*:kms:.*:[0-9]{12}:key/[a-z0-9]{8}-[a-z0-9]{4}-[a-z0-9]{4}-[a-z0-9]{4}-[a-z0-9]{12}
                  minLength: 20
                  maxLength: 2048
                Tags:
                  description: A list of <a href="https://docs.aws.amazon.com/lookoutmetrics/latest/dev/detectors-tags.html">tags</a> to apply to the anomaly detector.
                  type: object
                  minProperties: 1
                  maxProperties: 50
                  additionalProperties:
                    $ref: '#/components/schemas/TagValue'
      summary: Amazon Lookout for Metrics Create Anomaly Detector
      tags:
      - CreateAnomalyDetector
components:
  schemas:
    ServiceQuotaExceededException: {}
    ConflictException: {}
    AccessDeniedException: {}
    TooManyRequestsException: {}
    TagValue:
      type: string
      maxLength: 256
    ValidationException: {}
    InternalServerException: {}
    Frequency:
      type: string
      enum:
      - P1D
      - PT1H
      - PT10M
      - PT5M
    Arn:
      type: string
      pattern: arn:([a-z\d-]+):.*:.*:.*:.+
      maxLength: 256
    CreateAnomalyDetectorResponse:
      type: object
      properties:
        AnomalyDetectorArn:
          allOf:
          - $ref: '#/components/schemas/Arn'
          - description: The ARN of the detector.
