tags:
- name: ListMetricSets
paths:
  /ListMetricSets:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: ListMetricSets
      description: <p>Lists the datasets in the current AWS Region.</p> <p>Amazon Lookout for Metrics API actions are eventually consistent. If you do a read operation on a resource immediately after creating or modifying it, use retries to allow time for the write operation to complete.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMetricSetsResponse'
        '480':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
        '481':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '482':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '483':
          description: TooManyRequestsException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsException'
        '484':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
      parameters:
      - name: MaxResults
        in: query
        schema:
          type: string
        description: Pagination limit
        required: false
      - name: NextToken
        in: query
        schema:
          type: string
        description: Pagination token
        required: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                AnomalyDetectorArn:
                  description: The ARN of the anomaly detector containing the metrics sets to list.
                  type: string
                  pattern: arn:([a-z\d-]+):.*:.*:.*:.+
                  maxLength: 256
                MaxResults:
                  description: The maximum number of results to return.
                  type: integer
                  minimum: 1
                  maximum: 100
                NextToken:
                  description: If the result of the previous request was truncated, the response includes a <code>NextToken</code>. To retrieve the next set of results, use the token in the next request. Tokens expire after 24 hours.
                  type: string
                  pattern: .*\S.*
                  minLength: 1
                  maxLength: 3000
      summary: Amazon Lookout for Metrics List Metric Sets
      tags:
      - ListMetricSets
components:
  parameters:
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
  schemas:
    ValidationException: {}
    ListMetricSetsResponse:
      type: object
      properties:
        MetricSetSummaryList:
          allOf:
          - $ref: '#/components/schemas/MetricSetSummaryList'
          - description: A list of the datasets in the AWS Region, with configuration details for each.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/NextToken'
          - description: 'If the response is truncated, the list call returns this token. To retrieve the next set of results, use the token in the next list request. '
    ResourceNotFoundException: {}
    MetricSetName:
      type: string
      pattern: ^[a-zA-Z0-9][a-zA-Z0-9\-_]*
      minLength: 1
      maxLength: 63
    MetricSetSummary:
      type: object
      properties:
        MetricSetArn:
          allOf:
          - $ref: '#/components/schemas/Arn'
          - description: The ARN of the dataset.
        AnomalyDetectorArn:
          allOf:
          - $ref: '#/components/schemas/Arn'
          - description: The ARN of the detector to which the dataset belongs.
        MetricSetDescription:
          allOf:
          - $ref: '#/components/schemas/MetricSetDescription'
          - description: The description of the dataset.
        MetricSetName:
          allOf:
          - $ref: '#/components/schemas/MetricSetName'
          - description: The name of the dataset.
        CreationTime:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The time at which the dataset was created.
        LastModificationTime:
          allOf:
          - $ref: '#/components/schemas/Timestamp'
          - description: The time at which the dataset was last modified.
        Tags:
          allOf:
          - $ref: '#/components/schemas/TagMap'
          - description: The dataset's <a href="https://docs.aws.amazon.com/lookoutmetrics/latest/dev/detectors-tags.html">tags</a>.
      description: Contains information about a dataset.
    MetricSetSummaryList:
      type: array
      items:
        $ref: '#/components/schemas/MetricSetSummary'
    NextToken:
      type: string
      pattern: .*\S.*
      minLength: 1
      maxLength: 3000
    MetricSetDescription:
      type: string
      pattern: .*\S.*
      minLength: 1
      maxLength: 256
    Arn:
      type: string
      pattern: arn:([a-z\d-]+):.*:.*:.*:.+
      maxLength: 256
    Timestamp:
      type: string
      format: date-time
    TagMap:
      type: object
      minProperties: 1
      maxProperties: 50
      additionalProperties:
        $ref: '#/components/schemas/TagValue'
    AccessDeniedException: {}
    TooManyRequestsException: {}
    TagValue:
      type: string
      maxLength: 256
    InternalServerException: {}
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
