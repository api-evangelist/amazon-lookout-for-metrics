tags:
- name: ListAnomalyGroupRelatedMetrics
paths:
  /ListAnomalyGroupRelatedMetrics:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: ListAnomalyGroupRelatedMetrics
      description: Returns a list of measures that are potential causes or effects of an anomaly group.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAnomalyGroupRelatedMetricsResponse'
        '480':
          description: ResourceNotFoundException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceNotFoundException'
        '481':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
        '482':
          description: InternalServerException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalServerException'
        '483':
          description: AccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDeniedException'
        '484':
          description: TooManyRequestsException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TooManyRequestsException'
      parameters:
      - name: MaxResults
        in: query
        schema:
          type: string
        description: Pagination limit
        required: false
      - name: NextToken
        in: query
        schema:
          type: string
        description: Pagination token
        required: false
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - AnomalyDetectorArn
              - AnomalyGroupId
              properties:
                AnomalyDetectorArn:
                  description: The Amazon Resource Name (ARN) of the anomaly detector.
                  type: string
                  pattern: arn:([a-z\d-]+):.*:.*:.*:.+
                  maxLength: 256
                AnomalyGroupId:
                  description: The ID of the anomaly group.
                  type: string
                  pattern: '[a-z0-9]{8}-[a-z0-9]{4}-[a-z0-9]{4}-[a-z0-9]{4}-[a-z0-9]{12}'
                  maxLength: 63
                RelationshipTypeFilter:
                  description: Filter for potential causes (<code>CAUSE_OF_INPUT_ANOMALY_GROUP</code>) or downstream effects (<code>EFFECT_OF_INPUT_ANOMALY_GROUP</code>) of the anomaly group.
                  type: string
                  enum:
                  - CAUSE_OF_INPUT_ANOMALY_GROUP
                  - EFFECT_OF_INPUT_ANOMALY_GROUP
                MaxResults:
                  description: The maximum number of results to return.
                  type: integer
                  minimum: 1
                  maximum: 100
                NextToken:
                  description: Specify the pagination token that's returned by a previous request to retrieve the next page of results.
                  type: string
                  pattern: .*\S.*
                  minLength: 1
                  maxLength: 3000
      summary: Amazon Lookout for Metrics List Anomaly Group Related Metrics
      tags:
      - ListAnomalyGroupRelatedMetrics
components:
  schemas:
    ListAnomalyGroupRelatedMetricsResponse:
      type: object
      properties:
        InterMetricImpactList:
          allOf:
          - $ref: '#/components/schemas/InterMetricImpactList'
          - description: Aggregated details about the measures contributing to the anomaly group, and the measures potentially impacted by the anomaly group.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/NextToken'
          - description: The pagination token that's included if more results are available.
    ResourceNotFoundException: {}
    ValidationException: {}
    UUID:
      type: string
      pattern: '[a-z0-9]{8}-[a-z0-9]{4}-[a-z0-9]{4}-[a-z0-9]{4}-[a-z0-9]{12}'
      maxLength: 63
    MetricName:
      type: string
      pattern: ^[a-zA-Z0-9][a-zA-Z0-9\-_]*
      maxLength: 256
    InterMetricImpactList:
      type: array
      items:
        $ref: '#/components/schemas/InterMetricImpactDetails'
    RelationshipType:
      type: string
      enum:
      - CAUSE_OF_INPUT_ANOMALY_GROUP
      - EFFECT_OF_INPUT_ANOMALY_GROUP
    InterMetricImpactDetails:
      type: object
      properties:
        MetricName:
          allOf:
          - $ref: '#/components/schemas/MetricName'
          - description: The name of the measure.
        AnomalyGroupId:
          allOf:
          - $ref: '#/components/schemas/UUID'
          - description: The ID of the anomaly group.
        RelationshipType:
          allOf:
          - $ref: '#/components/schemas/RelationshipType'
          - description: Whether a measure is a potential cause of the anomaly group (<code>CAUSE_OF_INPUT_ANOMALY_GROUP</code>), or whether the measure is impacted by the anomaly group (<code>EFFECT_OF_INPUT_ANOMALY_GROUP</code>).
        ContributionPercentage:
          allOf:
          - $ref: '#/components/schemas/MetricChangePercentage'
          - description: For potential causes (<code>CAUSE_OF_INPUT_ANOMALY_GROUP</code>), the percentage contribution the measure has in causing the anomalies.
      description: <p>Aggregated details about the measures contributing to the anomaly group, and the measures potentially impacted by the anomaly group.</p> <p/>
    NextToken:
      type: string
      pattern: .*\S.*
      minLength: 1
      maxLength: 3000
    MetricChangePercentage:
      type: number
      format: double
      minimum: 0
      maximum: 100
    AccessDeniedException: {}
    TooManyRequestsException: {}
    InternalServerException: {}
